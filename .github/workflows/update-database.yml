name: Update Move Database

# Roda toda segunda-feira as 06:00 UTC + manual
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run update script
        shell: pwsh
        run: .\scripts\update-database.ps1

      - name: Check for changes
        id: diff
        shell: pwsh
        run: |
          $changes = git status --porcelain
          if ($changes) {
            "has_changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Changes detected:"
            Write-Host $changes
          } else {
            "has_changes=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "No changes."
          }

      - name: Create Pull Request
        if: steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(db): weekly update from Microsoft docs'
          title: 'chore(db): weekly database update'
          body: |
            Automated weekly update of the Azure move support database
            from the official Microsoft documentation.

            **Source:** [MicrosoftDocs/azure-docs](https://github.com/MicrosoftDocs/azure-docs/blob/main/articles/azure-resource-manager/management/move-support-resources.md)

            Generated by `.github/workflows/update-database.yml`.
          branch: chore/db-auto-update
          delete-branch: true
          labels: automated, database
